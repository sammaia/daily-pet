name: dailypet
description: "DailyPet - Acompanhe seu pet no dia a dia da creche"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend & Realtime
  supabase_flutter: ^2.0.0

  # Navegação
  go_router: ^14.0.0

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.0.0

  # Imagens
  cached_network_image: ^3.0.0
  image_picker: ^1.0.0

  # Push Notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Gráficos
  fl_chart: ^0.68.0

  # Internacionalização
  intl: ^0.19.0

  # Armazenamento seguro
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Geração de código Riverpod
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
